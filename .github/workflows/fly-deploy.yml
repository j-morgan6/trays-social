# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/
#
# Push-to-main triggers a sequential deploy:
#   1. deploy_review  → trays-social-review (staging, fly.toml) — auto
#   2. deploy_prod    → trays-social        (prod,    fly.prod.toml) — gated
#
# Review deploys automatically. Prod is gated by the `production` GitHub
# Environment, which has Required Reviewers set — the deploy_prod job sits
# in "Waiting for approval" until a reviewer clicks Approve in the GitHub
# Actions UI. To skip prod on a given push, click Reject in the approval
# screen. To deploy prod outside CI (emergency hotfix), run
# `fly deploy --config fly.prod.toml` locally — bypasses CI entirely.

name: Fly Deploy
on:
  push:
    branches:
      - main

# Least-privilege GITHUB_TOKEN scope (D40). The deploy jobs only need
# read access to clone the repo via actions/checkout — they neither write
# back to git nor interact with issues/PRs. Override per-job if a future
# step legitimately needs more.
permissions:
  contents: read

jobs:
  test:
    name: mix test
    # Gate every deploy on the full ExUnit suite. Added after the build-15
    # incident where the apple/2 auth controller double-encoded the bearer
    # (D38 follow-up miss) and shipped to prod, locking Apple Sign In users
    # out of the feed and uploads. The Apple round-trip regression test in
    # test/trays_social_web/api/v1/apple_auth_test.exs would have blocked
    # that push at this step instead of surfacing in TestFlight.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: trays_social_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28.1.1"
          elixir-version: "1.19.2-otp-28"
      - name: Restore deps + _build cache
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-
      - run: mix deps.get
      # --no-cover overrides the `test --cover` in the mix.exs `test` alias.
      # The project's coverage threshold (default 90%) is a separate dev-side
      # quality gate; the deploy gate's job is "tests pass," not "coverage
      # meets threshold." Conflating them blocks legitimate fixes from
      # shipping whenever coverage drifts below 90%, which is what happened
      # to the D60 push (71.44% coverage → exit 3 even though all 652 tests
      # passed). Tighten coverage separately if desired.
      - run: mix test --no-cover

  deploy_review:
    name: Deploy review env
    runs-on: ubuntu-latest
    needs: test
    concurrency: deploy-review
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1  # v1.6
      - run: flyctl deploy --remote-only --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy_prod:
    name: Deploy prod
    runs-on: ubuntu-latest
    needs: deploy_review
    concurrency: deploy-prod
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1  # v1.6
      - run: flyctl deploy --remote-only --config fly.prod.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
