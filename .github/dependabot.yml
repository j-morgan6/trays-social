# Dependabot keeps third-party GitHub Actions pinned to current SHAs so the
# pins in fly-deploy.yml (D39) don't quietly rot. PRs come in monthly and
# need human review before the next deploy uses the updated runner.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"

  # D41: watch Dockerfile base-image digests. When a publisher releases a
  # newer image for the same tag, Dependabot opens a PR with the updated
  # digest so a human reviews the change before prod picks it up.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
