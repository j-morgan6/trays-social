opt_in_rules:
  - empty_count
  - empty_string
  - explicit_init
  - first_where
  - implicit_return
  - last_where
  - literal_expression_end_indentation
  - operator_usage_whitespace
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  # unused_import requires `swiftlint analyze` (separate from `lint`); not in our pipeline

disabled_rules:
  # SwiftFormat owns these:
  - trailing_whitespace
  - vertical_whitespace
  - opening_brace
  - statement_position
  # SwiftFormat's trailingCommas rule re-adds what SwiftLint removes — let SwiftFormat win
  - trailing_comma

# Allow 1-2 char identifiers (idiomatic in Swift for UI math (x/y), time-formatting (h/m/s),
# and short loop variables (i/p/n) — fighting these adds noise without real safety value)
identifier_name:
  min_length:
    warning: 1
    error: 1

included:
  - ios/TraysSocial/TraysSocial

excluded:
  - "**/DerivedData"
  - "**/.build"
