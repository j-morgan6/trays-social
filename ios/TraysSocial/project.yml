name: TraysSocial
options:
  bundleIdPrefix: com.trays
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: "6TN2AZM26U"
    SWIFT_VERSION: "6.0"
targets:
  TraysSocial:
    type: application
    platform: iOS
    sources:
      - TraysSocial
    settings:
      base:
        INFOPLIST_FILE: TraysSocial/Info.plist
        CODE_SIGN_ENTITLEMENTS: TraysSocial/TraysSocial.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.trays.social
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 12
        MARKETING_VERSION: 1.0.1
        GENERATE_INFOPLIST_FILE: false
        TARGETED_DEVICE_FAMILY: "1"
        API_BASE_URL: "https://trays-social-review.fly.dev"
      configs:
        debug:
          API_BASE_URL: "https://trays-social-review.fly.dev"
        release:
          API_BASE_URL: "https://trays.app"
  TraysSocialTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - TraysSocialTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.trays.social.tests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/TraysSocial.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/TraysSocial
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: TraysSocial

schemes:
  TraysSocial:
    build:
      targets:
        TraysSocial: all
    run:
      config: Debug
    archive:
      config: Release
    test:
      config: Debug
      targets:
        - TraysSocialTests
    profile:
      config: Release
    analyze:
      config: Debug
