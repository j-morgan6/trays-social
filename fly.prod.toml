# fly.prod.toml app configuration file for trays-social (production)
#
# Forked from fly.toml on 2026-04-25.
# Three differences from review: app name, PHX_HOST, mount source.
#
# See https://fly.io/docs/reference/configuration/

app = 'trays-social'
primary_region = 'yyz'
kill_signal = 'SIGTERM'

[build]

[deploy]
  release_command = '/app/bin/migrate'

[env]
  PHX_HOST = 'trays.app'
  PORT = '8080'
  UPLOAD_DIR = '/data/uploads'

[mounts]
  source = 'trays_social_uploads'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
